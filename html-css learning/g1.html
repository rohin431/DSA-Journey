         <button id="_1000" onclick="plus1000()">₹1000</button>
         <button id="_500" onclick="plus500()">₹500</button>

         <button id="_50" onclick="plus50()">₹50</button>
         <button id="_20" onclick="plus20()" >₹20</button>

        <script src="g1.js"></script>
