<!DOCTYPE html>
<html>
  <title>Movie</title>
  <head>
<style>
  body,
  html {
    height: 100%;
  }

  * {
    box-sizing: border-box;
  }

  .bg-image {
    background-image: url("https://thedisinsider.com/wp-content/uploads/2021/05/22EC9E80-F2EE-44EF-95FA-850A9D181C31.jpeg");

    -webkit-filter: blur(8px);
    height: 100%;
    background-position: center;

    background-size: cover;
  }

  .bg-text {
    background-color: rgb(0, 0, 0);
    background-color: rgba(0, 0, 0, 0.4);
    color: white;
    font-weight: bold;
    border: 3px solid #f1f1f1;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    width: 80%;
    padding: 20px;
    text-align: center;
  }
  button {
    background-color: red;
    border: 0 solid red;
    padding: 10px 40px;
    margin-top: 30px;
    border-radius: 14px;
    cursor: pointer;
    transition-duration: 0.4s;
    font-size: 50px;
  }
  button:hover {
    background-color: white;
    color: black;
  }
  button {
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
  }

  button:hover {
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
  }
</style>
</head>
